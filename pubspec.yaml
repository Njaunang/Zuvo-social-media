name: zuvo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  cloud_firestore: ^6.2.0
  file_picker: ^10.3.8
  firebase_app_check: ^0.4.2
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_storage: ^13.2.0
  flutter:
    sdk: flutter
  flutter_facebook_auth: ^7.0.0
  flutter_localizations:
    sdk: flutter
  form_validator: ^2.1.1
  google_fonts: ^8.0.2
  hugeicons: ^1.1.6
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  toastification: ^3.0.3
  zego_uikit_prebuilt_call: ^4.22.4
  zego_uikit_prebuilt_live_audio_room: ^3.16.10
  zego_uikit_prebuilt_live_streaming: ^3.15.6
  zego_uikit_prebuilt_video_conference: ^2.11.1

dependency_overrides:
  zego_zim: 2.27.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
